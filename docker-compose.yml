services:
  app:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: web_catalog_app
    working_dir: /var/www
    volumes:
      - .:/var/www
    depends_on:
      - db
    networks:
      - web_catalog

  nginx:
    image: nginx:alpine
    container_name: web_catalog_nginx
    ports:
      - "8000:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - web_catalog

  db:
    image: postgres:16-alpine
    container_name: web_catalog_db
    environment:
      POSTGRES_DB: web_catalog
      POSTGRES_USER: web_catalog
      POSTGRES_PASSWORD: secret
    ports:
      - "5433:5432"
    volumes:
      - web_catalog_db_data:/var/lib/postgresql/data
    networks:
      - web_catalog

networks:
  web_catalog:
    driver: bridge

volumes:
  web_catalog_db_data:
